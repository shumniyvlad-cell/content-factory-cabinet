<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Контент-завод · Студия</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0c; --s1:#111114; --s2:#17171b; --s3:#1e1e23;
    --ink:#f4f5f7; --ink2:#a2a7b1; --mut:#62666e; --faint:#3d4046;
    --hair:rgba(255,255,255,.07); --hair2:rgba(255,255,255,.045);
    --gold:#e8b06b; --mint:#57e6a8; --grad:linear-gradient(92deg,#e8b06b,#57e6a8);
    --disp:'Space Grotesk',system-ui,sans-serif; --sans:'Geist',system-ui,sans-serif; --mono:'Geist Mono',monospace;
    --out:cubic-bezier(.22,1,.36,1); --spring:cubic-bezier(.34,1.4,.4,1);
    --rail:64px; --top:60px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-weight:400;
    -webkit-font-smoothing:antialiased;overflow:hidden;font-size:14px}
  ::selection{background:rgba(232,176,107,.3)}
  .aur{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
    background:radial-gradient(55% 40% at 78% -5%,rgba(232,176,107,.07),transparent 60%),
               radial-gradient(45% 38% at 12% 105%,rgba(87,230,168,.06),transparent 60%)}

  /* ═══ topbar ═══ */
  .top{position:fixed;top:0;left:0;right:0;height:var(--top);z-index:40;display:flex;align-items:center;
    padding:0 20px;gap:16px;background:rgba(10,10,12,.75);backdrop-filter:blur(20px) saturate(1.4);
    border-bottom:1px solid var(--hair2)}
  .mark{display:flex;align-items:center;gap:11px;min-width:calc(var(--rail) + 150px)}
  .mk{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:#141417;
    border:1px solid var(--hair);box-shadow:inset 0 1px 0 rgba(255,255,255,.07)}
  .mk svg{width:16px;height:16px}
  .mark .t1{font-family:var(--disp);font-weight:600;font-size:14px;letter-spacing:-.01em}
  .mark .t2{font-family:var(--mono);font-size:10px;color:var(--mut);letter-spacing:.14em;text-transform:uppercase;margin-top:1px}
  .nich{display:flex;align-items:center;gap:9px;height:36px;padding:0 14px 0 10px;border-radius:10px;cursor:pointer;
    background:var(--s1);border:1px solid var(--hair);transition:all .35s var(--out);font-size:13px;font-weight:500}
  .nich:hover{background:var(--s2);border-color:rgba(255,255,255,.12)}
  .nich .ni{width:20px;height:20px;border-radius:6px;display:grid;place-items:center;background:rgba(232,176,107,.12)}
  .nich .ni svg{width:12px;height:12px;stroke:var(--gold)}
  .nich .chev{color:var(--mut);font-size:10px;transition:transform .3s var(--out)}
  .flow-dots{display:flex;align-items:center;gap:6px;margin-left:auto}
  .fd{height:4px;border-radius:4px;background:var(--s3);width:16px;transition:all .6s var(--out)}
  .fd.on{background:var(--grad);width:26px}
  .live{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10.5px;color:var(--ink2);
    padding:0 12px;height:32px;border-radius:8px;background:var(--s1);border:1px solid var(--hair2)}
  .live b{color:var(--mint);font-weight:500}
  .live .dot{width:5px;height:5px;border-radius:50%;background:var(--mint);animation:blip 2.2s var(--out) infinite}
  @keyframes blip{0%,100%{box-shadow:0 0 0 0 rgba(87,230,168,.5)}55%{box-shadow:0 0 0 5px rgba(87,230,168,0)}}
  .ava{width:30px;height:30px;border-radius:50%;background:conic-gradient(from 210deg,#e8b06b,#57e6a8,#e8b06b);
    padding:1.5px;cursor:pointer;transition:transform .3s var(--spring)}
  .ava:hover{transform:scale(1.08)}
  .ava i{display:block;width:100%;height:100%;border-radius:50%;background:#1a1a1e url() center/cover;
    display:grid;place-items:center;font-family:var(--disp);font-size:11px;font-weight:600;font-style:normal}

  /* ═══ rail ═══ */
  .rail{position:fixed;top:var(--top);left:0;bottom:0;width:var(--rail);z-index:30;display:flex;flex-direction:column;
    align-items:center;padding:14px 0;gap:6px;border-right:1px solid var(--hair2)}
  .rb{position:relative;width:40px;height:40px;border-radius:11px;display:grid;place-items:center;cursor:pointer;
    color:var(--mut);transition:all .35s var(--out);border:1px solid transparent}
  .rb svg{width:19px;height:19px;transition:transform .35s var(--spring)}
  .rb:hover{color:var(--ink2);background:var(--s1)}
  .rb:hover svg{transform:translateY(-1px) scale(1.06)}
  .rb.on{color:var(--ink);background:var(--s2);border-color:var(--hair);box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
  .rb.on::before{content:"";position:absolute;left:-13px;width:3px;height:18px;border-radius:3px;background:var(--grad)}
  .rb.lock{opacity:.28;cursor:default}
  .rb.lock:hover{background:transparent;color:var(--mut)}
  .rb .tip{position:absolute;left:52px;top:50%;transform:translateY(-50%) translateX(-6px);white-space:nowrap;
    background:#1c1c21;border:1px solid var(--hair);color:var(--ink);font-size:12px;font-weight:500;
    padding:6px 11px;border-radius:8px;opacity:0;pointer-events:none;transition:all .25s var(--out);z-index:50;
    box-shadow:0 10px 30px -10px rgba(0,0,0,.7)}
  .rb:hover .tip{opacity:1;transform:translateY(-50%) translateX(0)}
  .rb .bdg{position:absolute;top:4px;right:4px;min-width:15px;height:15px;border-radius:8px;background:var(--grad);
    color:#0a0a0c;font-size:9px;font-weight:700;display:grid;place-items:center;padding:0 4px;font-family:var(--disp)}

  /* ═══ stage ═══ */
  .stage{position:fixed;top:var(--top);left:var(--rail);right:0;bottom:0;overflow-y:auto;overflow-x:hidden;z-index:1}
  .stage::-webkit-scrollbar{width:8px}
  .stage::-webkit-scrollbar-thumb{background:var(--s3);border-radius:8px;border:2px solid var(--bg)}
  .view{max-width:1240px;margin:0 auto;padding:40px 48px 160px;opacity:1}
  .view.out{animation:vOut .28s var(--out) forwards}
  .view.in{animation:vIn .5s var(--out)}
  @keyframes vOut{to{opacity:0;transform:translateY(-14px)}}
  @keyframes vIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

  .rv{opacity:0;transform:translateY(26px) scale(.985);filter:blur(5px)}
  .rv.go{opacity:1;transform:none;filter:none;transition:opacity .7s var(--out),transform .7s var(--spring),filter .6s var(--out)}
  @media(prefers-reduced-motion:reduce){
    *{animation-duration:.001s !important;transition-duration:.001s !important}
    .rv{opacity:1;transform:none;filter:none}
  }

  .eyebrow{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;
    text-transform:uppercase;color:var(--mut);margin-bottom:18px}
  .eyebrow i{width:5px;height:5px;border-radius:50%;background:var(--gold);font-style:normal}
  h1.hero{font-family:var(--disp);font-weight:600;letter-spacing:-.03em;line-height:1.02;font-size:56px}
  h1.hero .dim{color:var(--mut)}
  h1.hero .grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  h2.vt{font-family:var(--disp);font-weight:600;font-size:30px;letter-spacing:-.02em;margin-bottom:6px}
  .vsub{color:var(--ink2);font-size:14px;font-weight:300;max-width:620px;line-height:1.55}
  .sect{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--mut);
    margin:38px 0 16px;display:flex;align-items:center;gap:12px}
  .sect::after{content:"";flex:1;height:1px;background:var(--hair2)}

  /* ═══ home hero panel ═══ */
  .console{margin-top:34px;background:var(--s1);border:1px solid var(--hair);border-radius:16px;overflow:hidden;
    box-shadow:0 30px 80px -40px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.05)}
  .con-in{padding:26px 26px 22px}
  .con-q{font-size:15px;color:var(--ink2);font-weight:300;margin-bottom:18px}
  .prompt{display:flex;align-items:center;gap:13px;background:rgba(0,0,0,.35);border:1px solid var(--hair);
    border-radius:12px;padding:0 16px;height:54px;margin-bottom:18px;transition:border-color .35s var(--out),box-shadow .35s var(--out)}
  .prompt:focus-within{border-color:rgba(232,176,107,.45);box-shadow:0 0 0 3px rgba(232,176,107,.07)}
  .prompt svg{width:17px;height:17px;stroke:var(--mut);flex-shrink:0}
  .prompt:focus-within svg{stroke:var(--gold)}
  .prompt input{flex:1;background:none;border:none;outline:none;color:var(--ink);font-family:var(--sans);
    font-size:15px;font-weight:400;min-width:0}
  .prompt input::placeholder{color:var(--mut);font-weight:300}
  .prompt kbd{font-family:var(--mono);font-size:10px;color:var(--mut);border:1px solid var(--hair);
    border-radius:6px;padding:3px 8px;letter-spacing:.06em;flex-shrink:0}
  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{display:inline-flex;align-items:center;gap:9px;height:38px;padding:0 15px;border-radius:10px;cursor:pointer;
    background:var(--s2);border:1px solid var(--hair2);font-size:13px;font-weight:500;color:var(--ink2);
    transition:all .35s var(--out)}
  .chip svg{width:14px;height:14px;stroke:var(--mut);transition:stroke .3s}
  .chip:hover{background:var(--s3);color:var(--ink);border-color:rgba(255,255,255,.13);transform:translateY(-1px)}
  .chip:hover svg{stroke:var(--gold)}
  .chip.on{background:rgba(232,176,107,.1);border-color:rgba(232,176,107,.4);color:var(--ink)}
  .chip.on svg{stroke:var(--gold)}
  .chip .st{font-family:var(--mono);font-size:9.5px;color:var(--mut);letter-spacing:.06em}
  .con-foot{display:flex;align-items:center;gap:14px;padding:15px 26px;border-top:1px solid var(--hair2);
    background:rgba(0,0,0,.25)}
  .con-hint{font-family:var(--mono);font-size:11px;color:var(--mut)}
  .btn{position:relative;display:inline-flex;align-items:center;gap:10px;height:42px;padding:0 22px;border:none;
    border-radius:11px;cursor:pointer;font-family:var(--disp);font-weight:600;font-size:14px;letter-spacing:-.01em;
    transition:transform .35s var(--spring),box-shadow .35s var(--out),opacity .3s;margin-left:auto}
  .btn.grad{background:var(--grad);color:#0b0b0d;box-shadow:0 8px 28px -10px rgba(232,176,107,.5)}
  .btn.grad:hover{transform:translateY(-2px);box-shadow:0 14px 36px -10px rgba(232,176,107,.6)}
  .btn.grad:active{transform:scale(.97)}
  .btn.white{background:var(--ink);color:#0b0b0d}
  .btn.white:hover{transform:translateY(-2px)}
  .btn.ghost{background:var(--s2);color:var(--ink2);border:1px solid var(--hair);margin-left:0}
  .btn.ghost:hover{color:var(--ink);background:var(--s3)}
  .btn:disabled{opacity:.3;cursor:not-allowed;transform:none !important}
  .btn svg{width:15px;height:15px}
  .btn.grad svg,.btn.white svg{stroke:#0b0b0d}

  /* home stats + recent */
  .hstats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}
  .hs{background:var(--s1);border:1px solid var(--hair2);border-radius:14px;padding:18px 20px;transition:all .4s var(--out)}
  .hs:hover{border-color:var(--hair);transform:translateY(-2px)}
  .hs .n{font-family:var(--disp);font-weight:600;font-size:30px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .hs .n em{font-style:normal;color:var(--mint);font-size:.55em;margin-left:2px}
  .hs .l{font-size:11.5px;color:var(--mut);margin-top:7px}
  .recent{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .rc{aspect-ratio:9/16;border-radius:12px;overflow:hidden;position:relative;cursor:pointer;background:var(--s2);
    transition:transform .4s var(--spring),box-shadow .4s var(--out)}
  .rc video,.rc img{width:100%;height:100%;object-fit:cover;display:block}
  .rc:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 18px 40px -18px rgba(0,0,0,.9)}
  .rc .rl{position:absolute;left:9px;bottom:8px;right:9px;font-size:10.5px;font-weight:500;color:#fff;
    text-shadow:0 1px 6px rgba(0,0,0,.8);opacity:0;transform:translateY(6px);transition:all .35s var(--out)}
  .rc:hover .rl{opacity:1;transform:none}
  .rc::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 60%,rgba(0,0,0,.55));
    opacity:0;transition:opacity .35s}
  .rc:hover::after{opacity:1}

  /* ═══ scan (terminal) ═══ */
  .term{margin-top:30px;background:#0c0d10;border:1px solid var(--hair);border-radius:14px;overflow:hidden;
    font-family:var(--mono);font-size:12px;box-shadow:0 30px 70px -40px rgba(0,0,0,.9)}
  .term-h{display:flex;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid var(--hair2);
    background:rgba(255,255,255,.02)}
  .term-h i{width:9px;height:9px;border-radius:50%;background:var(--s3);font-style:normal}
  .term-h i:first-child{background:#e0655a}.term-h i:nth-child(2){background:#e0b34f}.term-h i:nth-child(3){background:#57bb6a}
  .term-h span{margin-left:10px;color:var(--mut);font-size:11px}
  .term-b{padding:18px 20px;min-height:200px;line-height:1.9;color:var(--ink2)}
  .term-b .ln{opacity:0;animation:lnIn .3s var(--out) forwards}
  @keyframes lnIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
  .term-b .ok{color:var(--mint)} .term-b .ac{color:var(--gold)} .term-b .dim{color:var(--mut)}
  .cursor{display:inline-block;width:7px;height:13px;background:var(--mint);vertical-align:-2px;animation:cur 1s steps(2) infinite}
  @keyframes cur{50%{opacity:0}}
  .scanbar{height:2px;background:var(--s3);border-radius:2px;overflow:hidden;margin-top:4px}
  .scanbar i{display:block;height:100%;width:0;background:var(--grad);transition:width .5s var(--out)}

  /* ═══ refs grid ═══ */
  .rgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .refc{position:relative;background:var(--s1);border:1px solid var(--hair2);border-radius:14px;padding:10px;cursor:pointer;
    transition:transform .4s var(--spring),border-color .35s,background .35s,box-shadow .4s var(--out)}
  .refc:hover{transform:translateY(-4px);border-color:var(--hair);box-shadow:0 22px 50px -24px rgba(0,0,0,.85)}
  .refc.sel{border-color:rgba(232,176,107,.45);background:rgba(232,176,107,.045)}
  .refc .th{aspect-ratio:9/12;border-radius:9px;position:relative;overflow:hidden;
    background:linear-gradient(155deg,#1b1c21,#101014)}
  .refc .th .pp{position:absolute;inset:0;display:grid;place-items:center}
  .refc .th .pp i{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid var(--hair);
    display:grid;place-items:center;transition:all .35s var(--spring);font-style:normal}
  .refc:hover .th .pp i{transform:scale(1.12);background:rgba(255,255,255,.12)}
  .refc .th .pp svg{width:15px;height:15px;fill:var(--ink);stroke:none;margin-left:2px}
  .refc .hnd{position:absolute;left:11px;bottom:9px;font-size:12px;font-weight:500;color:#fff;text-shadow:0 1px 6px #000}
  .ring{position:absolute;top:9px;right:9px;width:40px;height:40px}
  .ring svg{transform:rotate(-90deg)}
  .ring .bgc{stroke:rgba(255,255,255,.09)}
  .ring .fgc{stroke-linecap:round;stroke-dasharray:107;stroke-dashoffset:107;transition:stroke-dashoffset 1.1s var(--out)}
  .ring .val{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--disp);font-size:12px;font-weight:600}
  .rmeta{display:flex;justify-content:space-between;align-items:center;padding:11px 5px 4px;font-size:11.5px;color:var(--mut)}
  .rmeta b{color:var(--ink2);font-weight:500;font-variant-numeric:tabular-nums}
  .ck{position:absolute;top:16px;left:16px;width:22px;height:22px;border-radius:7px;z-index:2;
    background:rgba(10,10,12,.6);border:1px solid var(--hair);display:grid;place-items:center;
    transition:all .3s var(--spring);backdrop-filter:blur(4px)}
  .refc.sel .ck{background:var(--gold);border-color:var(--gold);transform:scale(1.05)}
  .ck svg{width:12px;height:12px;stroke:#0b0b0d;stroke-width:3;opacity:0;transition:opacity .2s}
  .refc.sel .ck svg{opacity:1}

  /* ═══ scripts ═══ */
  .sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .scard{background:var(--s1);border:1px solid var(--hair2);border-radius:14px;padding:20px;cursor:pointer;position:relative;
    transition:transform .4s var(--spring),border-color .35s,background .35s,box-shadow .4s var(--out)}
  .scard:hover{transform:translateY(-3px);border-color:var(--hair);box-shadow:0 20px 46px -24px rgba(0,0,0,.8)}
  .scard.sel{border-color:rgba(87,230,168,.4);background:rgba(87,230,168,.035)}
  .scard .seg{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
  .scard h3{font-family:var(--disp);font-weight:600;font-size:17px;letter-spacing:-.01em;margin-bottom:12px;padding-right:34px}
  .scard .hk{font-size:13px;line-height:1.55;color:var(--ink2);font-weight:300;padding:12px 14px;border-radius:10px;
    background:rgba(0,0,0,.3);border-left:2px solid var(--gold)}
  .scard .mt{display:flex;gap:14px;margin-top:14px;font-family:var(--mono);font-size:10.5px;color:var(--mut)}
  .scard .ck{position:absolute;top:18px;right:18px;left:auto}
  .scard.sel .ck{background:var(--mint);border-color:var(--mint)}
  .sb-w{overflow:hidden;transition:max-height .55s var(--out);max-height:0}
  .scard.open .sb-w{max-height:600px}
  .sb{border-top:1px solid var(--hair2);margin-top:14px;padding-top:12px}
  .sb .row{display:grid;grid-template-columns:18px 1fr;gap:10px;padding:6px 0;font-size:12px;color:var(--ink2);line-height:1.5}
  .sb .row i{font-family:var(--disp);color:var(--gold);font-weight:600;font-size:11px;font-style:normal}
  .sb .row b{color:var(--ink);font-weight:500}
  .exp{display:inline-flex;align-items:center;gap:7px;margin-top:13px;font-size:11.5px;font-weight:500;color:var(--mut);
    transition:color .3s}
  .scard:hover .exp{color:var(--ink2)}
  .exp svg{width:12px;height:12px;transition:transform .4s var(--spring)}
  .scard.open .exp svg{transform:rotate(180deg)}

  /* ═══ generation ═══ */
  .glab{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--mut);margin:26px 0 12px}
  .ggrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .gc{background:var(--s1);border:1px solid var(--hair2);border-radius:14px;padding:18px;cursor:pointer;position:relative;
    transition:transform .4s var(--spring),border-color .35s,background .35s}
  .gc:hover{transform:translateY(-3px);border-color:var(--hair)}
  .gc.sel{border-color:rgba(232,176,107,.5);background:rgba(232,176,107,.05)}
  .gc h4{font-family:var(--disp);font-weight:600;font-size:15px;display:flex;align-items:center;gap:8px}
  .gc .kb{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:3px 7px;border-radius:6px}
  .kb.v{color:#9fc0ff;background:rgba(120,160,255,.12)}
  .kb.p{color:var(--mint);background:rgba(87,230,168,.12)}
  .gc p{font-size:12px;color:var(--mut);line-height:1.5;margin-top:9px;font-weight:300}
  .gc .rec{position:absolute;top:-8px;right:12px;font-family:var(--mono);font-size:9px;letter-spacing:.12em;
    text-transform:uppercase;background:var(--grad);color:#0b0b0d;font-weight:700;padding:3px 8px;border-radius:6px}

  .pipe{margin-top:26px;background:var(--s1);border:1px solid var(--hair);border-radius:14px;padding:22px 24px}
  .pstep{display:flex;align-items:center;gap:14px;padding:9px 0;opacity:.35;transition:opacity .4s var(--out)}
  .pstep.act,.pstep.done{opacity:1}
  .pstep .pi{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;background:var(--s3);
    font-family:var(--mono);font-size:11px;color:var(--mut);transition:all .4s var(--out);flex-shrink:0}
  .pstep.act .pi{background:rgba(232,176,107,.15);color:var(--gold)}
  .pstep.done .pi{background:rgba(87,230,168,.15);color:var(--mint)}
  .pstep .pt{font-size:13px;font-weight:500;color:var(--ink2)}
  .pstep.act .pt{color:var(--ink)}
  .pstep .pd{font-family:var(--mono);font-size:10.5px;color:var(--mut);margin-left:auto}
  .pstep .spin{width:12px;height:12px;border:1.5px solid var(--s3);border-top-color:var(--gold);border-radius:50%;
    animation:rot .8s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}

  .vgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .vc{background:var(--s1);border:1px solid var(--hair2);border-radius:14px;padding:9px;
    transition:transform .4s var(--spring),box-shadow .4s var(--out),border-color .35s}
  .vc:hover{transform:translateY(-4px);border-color:var(--hair);box-shadow:0 24px 54px -26px rgba(0,0,0,.9)}
  .vc .vw{aspect-ratio:9/16;border-radius:9px;overflow:hidden;background:#000;position:relative}
  .vc video{width:100%;height:100%;object-fit:cover;display:block}
  .vc .vi{padding:12px 7px 5px}
  .vc .vt2{font-size:13px;font-weight:500}

  /* ═══ publish ═══ */

  .q .tagp{font-family:var(--mono);font-size:9.5px;padding:4px 8px;border-radius:6px;color:var(--mint);

    display:flex;align-items:center;gap:16px;background:rgba(18,18,22,.85);border:1px solid var(--hair);

  .dock.show{transform:translateX(-50%) translateY(0);opacity:1}
  .dock .di{font-size:12.5px;color:var(--ink2)} .dock .di b{color:var(--ink);font-weight:600}
  /* keys modal */
  .veil{position:fixed;inset:0;z-index:70;background:rgba(5,5,7,.7);backdrop-filter:blur(8px);
    display:none;place-items:center;opacity:0;transition:opacity .35s var(--out)}

  .modal{width:min(520px,92vw);background:#131318;border:1px solid var(--hair);border-radius:18px;padding:26px;
    box-shadow:0 40px 100px -30px rgba(0,0,0,.9);transform:translateY(16px) scale(.98);transition:transform .45s var(--spring)}
  .veil.show .modal{transform:none}
  .modal h3{font-family:var(--disp);font-weight:600;font-size:19px;margin-bottom:8px}

    color:var(--mut);margin:14px 0 7px}
  .modal input{width:100%;height:44px;background:rgba(0,0,0,.4);border:1px solid var(--hair);border-radius:10px;

    background:var(--s1);border:1px solid var(--hair);transition:all .3s var(--out)}
  .keybtn:hover{background:var(--s2)}

  .demoTag{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--gold2);background:rgba(232,176,107,.08);border:1px solid rgba(232,176,107,.25);
    border-radius:8px;padding:6px 10px;margin-left:12px}
  .refc .th img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .refc .ext{position:absolute;right:9px;bottom:8px;font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.85);
    background:rgba(0,0,0,.55);padding:3px 7px;border-radius:6px;opacity:0;transition:opacity .3s;backdrop-filter:blur(4px)}
  .refc:hover .ext{opacity:1}
  .frame-note{font-size:12px;color:var(--mut);border:1px dashed var(--hair);border-radius:10px;padding:12px 16px;
    margin-top:18px;line-height:1.5}

    background:rgba(18,19,23,.92);border:1px solid rgba(87,230,168,.35);border-radius:13px;padding:14px 16px;
    backdrop-filter:blur(20px);box-shadow:0 24px 60px -20px rgba(0,0,0,.9);

  .toast.show{transform:none;opacity:1}
  .toast .ti{width:26px;height:26px;border-radius:8px;background:rgba(87,230,168,.14);display:grid;place-items:center;flex-shrink:0}
  .toast .ti svg{width:13px;height:13px;stroke:var(--mint)}
  .toast .tt{font-size:13px;font-weight:600} .toast .ts{font-size:11.5px;color:var(--ink2);margin-top:3px;line-height:1.45}

  @media(max-width:960px){

  }
</style>

<script src="data.js"></script>
<script>
const D=window.CF_DATA;
const fmt=n=>n.toLocaleString('ru-RU');

/* ═══ живой режим: все ключи на сервере, кабинет ходит через прокси завода ═══ */
const PROXY='https://krutimai.ru/cf-api';
let KEYS={apify:'',gemini:''};
try{KEYS={...KEYS,...JSON.parse(localStorage.getItem('cf_keys')||'{}')}}catch(e){}
const mode=()=>S.niche==='custom'?'real':'demo';
const hasKeys=()=>S.proxyOk===true;
function probeProxy(){
  fetch(PROXY+'/health',{cache:'no-store'}).then(r=>r.json())
    .then(d=>{S.proxyOk=!!d.ok;syncLive();
      if(S.proxyOk&&S.niche==='custom'&&!S.scanned&&S.view==='refs')paint();})
    .catch(()=>{S.proxyOk=false;syncLive();});
}
function openKeys(){document.getElementById('kApify').value=KEYS.apify;document.getElementById('kGemini').value=KEYS.gemini;
  document.getElementById('veil').classList.add('show');}
function closeKeys(){document.getElementById('veil').classList.remove('show');}
function saveKeys(){KEYS.apify=document.getElementById('kApify').value.trim();KEYS.gemini=document.getElementById('kGemini').value.trim();
  localStorage.setItem('cf_keys',JSON.stringify(KEYS));closeKeys();syncLive();
  toast('Ключи сохранены','Только в этом браузере (localStorage). Живой режим включён.');
  if(S.niche==='custom'&&!S.scanned&&S.view==='refs')paint();}
function syncLive(){const st=document.getElementById('liveSt');
  if(st)st.textContent=S.proxyOk===true?'online':(S.proxyOk===false?'offline':'…');}
const activeRefs=()=>mode()==='real'?(S.realRefs||[]):D.references;
const activeScripts=()=>mode()==='real'?(S.realScripts||[]):D.scripts;

/* реальный скан ниши: Apify hashtag-scraper из браузера */
async function realScan(){
  const n=curNiche(),log=document.getElementById('tlog'),bar=document.getElementById('sbar');
  const ln=(h)=>{if(document.getElementById('tlog'))log.insertAdjacentHTML('beforeend',`<div class="ln">${h}</div>`)};
  const tags=(S.customTags&&S.customTags.length?S.customTags:['#'+(n.name||'ниша').toLowerCase().replace(/\s+/g,'')]).map(t=>t.replace('#',''));
  ln(`<span class="dim">$</span> factory trends-pull --niche "${n.name}" --source apify <span class="dim">· live</span>`);
  ln(`<span class="ac">→</span> POST api.apify.com/v2/acts/apify~instagram-hashtag-scraper`);
  ln(`<span class="dim">·</span> хэштеги: ${tags.map(t=>'#'+t).join(' ')} · до 25 постов`);
  bar.style.width='18%';
  const t0=Date.now();const tick=setInterval(()=>{const el=document.getElementById('elapsed');
    if(el)el.textContent=Math.round((Date.now()-t0)/1000)+'с';},500);
  ln(`<span class="ac">⋯</span> ступень 1: авторы ниши по хэштегам · <span class="ac" id="elapsed">0с</span>`);
  try{
    // Ступень 1: посты хэштега → уникальные авторы ниши (recent-выдача, метрик почти нет — она только для имён)
    const r1=await fetch(`${PROXY}/scan`,
      {method:'POST',headers:{'Content-Type':'application/json'},
       body:JSON.stringify({hashtags:tags.slice(0,2),limit:25})});
    if(!r1.ok)throw new Error('HTTP '+r1.status);
    const posts=((await r1.json())||[]).filter(i=>i&&i.ownerUsername);
    bar.style.width='34%';
    const byAuthor={};
    posts.forEach(p=>{const u=p.ownerUsername;
      if(!byAuthor[u]||(p.likesCount||0)>byAuthor[u])byAuthor[u]=p.likesCount||0;});
    const authors=Object.entries(byAuthor).sort((a,b)=>b[1]-a[1]).map(([u])=>u).slice(0,6);
    if(!authors.length)throw new Error('по этим хэштегам никого не нашли — попробуй другую формулировку');
    ln(`<span class="ok">✓</span> авторы ниши: ${authors.map(a=>'@'+a).join(' ')}`);
    ln(`<span class="ac">⋯</span> ступень 2: тяну их свежие рилсы с просмотрами <span class="dim">(20–60с)</span>`);
    // Ступень 2: рилсы авторов — только видео, с реальными просмотрами
    const r2=await fetch(`${PROXY}/reels`,
      {method:'POST',headers:{'Content-Type':'application/json'},
       body:JSON.stringify({usernames:authors,limit:5})});
    if(!r2.ok)throw new Error('HTTP '+r2.status);
    let reels=((await r2.json())||[]).filter(i=>i&&i.ownerUsername&&(i.url||i.shortCode));
    clearInterval(tick);bar.style.width='84%';
    const vv=p=>p.videoViewCount||p.videoPlayCount||0;
    reels.sort((a,b)=>(vv(b)-vv(a))||((b.likesCount||0)-(a.likesCount||0)));
    let top=reels.slice(0,12);
    // фолбэк: если рилсов совсем нет — показываем лучшие посты ступени 1, честно без просмотров
    if(top.length<3){
      posts.sort((a,b)=>(b.likesCount||0)-(a.likesCount||0));
      top=posts.slice(0,12);
      ln(`<span class="dim">рилсов мало — добавил лучшие посты хэштега</span>`);
    }
    const maxV=Math.max(1,...top.map(p=>vv(p)||0)),maxL=Math.max(1,...top.map(p=>p.likesCount||0));
    S.realRefs=top.map((p,i)=>({handle:p.ownerUsername,url:p.url||('https://www.instagram.com/p/'+p.shortCode+'/'),
      views:vv(p),likes:p.likesCount||0,caption:(p.caption||'').slice(0,160),thumb:p.displayUrl||'',
      score:Math.round(30*Math.max(vv(p)/maxV,(p.likesCount||0)/maxL*.8,(12-i)/12*.3))}));
    ln(`<span class="ok">✓</span> рилсов с просмотрами: <span class="ac">${top.length}</span> · отранжированы по виральности`);
    ln(`<span class="ok">✓</span> готово за ${Math.round((Date.now()-t0)/1000)}с`);
    bar.style.width='100%';
    setTimeout(()=>{S.scanned=true;S.refs=new Set(S.realRefs.slice(0,6).map((_,k)=>k));
      unlockUpTo('scripts');paint();toast('Живой скан завершён',`#${tags[0]} · ${top.length} рилсов авторов ниши`);},700);
  }catch(e){clearInterval(tick);
    ln(`<span style="color:#e0655a">✗</span> ${String(e.message||e).slice(0,140)}`);
    ln(`<span class="dim">попробуй другую формулировку ниши или повтори через минуту</span>`);
  }
}

/* реальные сценарии: Gemini пишет под нишу на основе найденных постов */
async function realScripts(){
  S.scriptsLoading=true;paint();
  const n=curNiche();
  const ctx=(S.realRefs||[]).slice(0,6).map(r=>`@${r.handle} (${r.likes} лайков): ${r.caption}`).join('\n');
  const schema={type:"object",properties:{scripts:{type:"array",items:{type:"object",properties:{
    title:{type:"string"},segment:{type:"string"},format:{type:"string"},hook:{type:"string"},
    scenes:{type:"array",items:{type:"object",properties:{shot:{type:"string"},vo:{type:"string"},on:{type:"string"}},required:["shot","vo","on"]}},
    caption:{type:"string"},hashtags:{type:"array",items:{type:"string"}},duration:{type:"integer"}},
    required:["title","segment","format","hook","scenes","caption","hashtags","duration"]}}},required:["scripts"]};
  const prompt=`Ты сценарист вирусных вертикальных Reels. Ниша: «${n.name}». Реальные посты из этой ниши (Instagram, сегодня):\n${ctx||'(нет контекста)'}\n\nНапиши 3 РАЗНЫХ сценария Reels (20-35 сек) для бизнеса в этой нише: разные углы (боль клиента / закулисье / цифры), сильный хук в первые 2 сек, 4-5 сцен (кадр, закадровый голос, титр на экране), продающая подпись, 4-6 хэштегов, hаштеги с решёткой. Язык русский, живой, без канцелярита. duration в секундах.`;
  try{
    const r=await fetch(`${PROXY}/gemini/gemini-2.5-flash:generateContent`,
      {method:'POST',headers:{'Content-Type':'application/json'},
       body:JSON.stringify({contents:[{parts:[{text:prompt}]}],
         generationConfig:{responseMimeType:'application/json',responseSchema:schema,temperature:.9}})});
    if(!r.ok)throw new Error('Gemini HTTP '+r.status);
    const d=await r.json();
    const out=JSON.parse(d.candidates[0].content.parts[0].text);
    S.realScripts=(out.scripts||[]).slice(0,3).map((s,i)=>({id:i+1,title:s.title,segment:s.segment,format:s.format,
      hooks:[s.hook],scenes:s.scenes||[],caption:s.caption,hashtags:s.hashtags||[],duration:s.duration||30,
      visual:'',video:''}));
    S.scripts=new Set(S.realScripts.map(s=>s.id));
    S.scriptsLoading=false;unlockUpTo('gen');paint();
    toast('Сценарии готовы',`Gemini написал ${S.realScripts.length} сценария под «${n.name}»`);
  }catch(e){S.scriptsLoading=false;paint();toast('Ошибка генерации',humanErr(e));}
}
function humanErr(e){
  const s=String(e&&e.message||e);
  if(s.includes('429'))return 'На Gemini-ключе кончились кредиты/квота — пополни в AI Studio (ai.studio/projects) и повтори.';
  if(s.includes('403')||s.includes('401'))return 'Ключ не принят — проверь его в настройках (иконка ключа сверху).';
  if(s.includes('Failed to fetch'))return 'Сеть/блокировка запроса. Проверь интернет или VPN.';
  return s.slice(0,140);
}

/* реальные hero-кадры: nano-banana (Gemini image) */
async function realFrames(){
  const list=activeScripts().filter(s=>S.scripts.has(s.id));
  S.realFrames=S.realFrames||{};
  for(let i=0;i<list.length;i++){
    const s=list[i];const st=document.getElementById('pd1');
    if(st)st.textContent=`кадр ${i+1}/${list.length}`;
    const prompt=`Vertical 9:16 cinematic photo, premium dark aesthetic for a short video cover. Business niche: ${curNiche().name}. Scene: ${s.scenes[0]?.shot||s.title}. Moody lighting, high detail, photorealistic. No readable text, no numbers, no watermarks, no logos.`;
    try{
      const r=await fetch(`${PROXY}/gemini/gemini-3.1-flash-image:generateContent`,
        {method:'POST',headers:{'Content-Type':'application/json'},
         body:JSON.stringify({contents:[{parts:[{text:prompt}]}],
           generationConfig:{responseModalities:['TEXT','IMAGE'],imageConfig:{aspectRatio:'9:16'}}})});
      const d=await r.json();

    const t=+el.dataset.count,st=performance.now();
    const tick=n=>{const k=Math.min(1,(n-st)/900);el.textContent=fmt(Math.round(t*(1-Math.pow(1-k,3))));

/* hover-play с самовосстановлением: браузер может глушить видео сразу после play() —
   пока курсор на карточке (v._want), любая внешняя пауза перезапускает воспроизведение */
function hp(el,on){
  const v=el.querySelector('video');if(!v)return;
  if(on){
    v._want=true;
    if(!v._guard){v._guard=()=>{if(v._want)setTimeout(()=>v._want&&v.play().catch(()=>{}),80)};v.addEventListener('pause',v._guard);}
    v.play().catch(()=>{});
  }else{v._want=false;v.pause();v.currentTime=0;}
}

    `<span class="dim">$</span> factory trends-pull --niche "${n.name}" --source apify`,
    `<span class="ac">→</span> POST api.apify.com/v2/acts/apify~instagram-reel-scraper`,
    `<span class="dim">·</span> фильтр: ${n.tags.join(' ')}`,
    ...handles.map(h=>{
      const rs=D.references.filter(r=>r.handle===h);
      return `<span class="ok">✓</span> @${h} <span class="dim">·</span> ${rs.length} рилсов <span class="dim">·</span> max score <span class="ac">${Math.max(...rs.map(r=>r.score)).toFixed(1)}</span>`;}),
    `<span class="ok">✓</span> скоринг виральности: views ÷ followers · engage · retention`,
    `<span class="ok">✓</span> найдено <span class="ac">${D.references.length}</span> · отобран топ-6`,
  ];
  let i=0;
  const step=()=>{
    if(!document.getElementById('tlog'))return;
    if(i<lines.length){
      log.insertAdjacentHTML('beforeend',`<div class="ln">${lines[i]}</div>`);
      bar.style.width=((i+1)/lines.length*100)+'%';i++;setTimeout(step,i<3?420:300);

      log.insertAdjacentHTML('beforeend',`<div class="ln"><span class="cursor"></span></div>`);
      setTimeout(()=>{S.scanned=true;D.references.slice(0,6).forEach((_,k)=>S.refs.add(k));

    }
  };

}

  const list=activeScripts().filter(s=>S.scripts.has(s.id));
  if(mode()==='real'){
    return `<div class="rv"><div class="eyebrow"><i></i>шаг 3 · цех генерации · live</div>
    <h2 class="vt" style="display:flex;align-items:center">Hero-кадры готовы
      <span class="demoTag" style="color:var(--mint);background:rgba(87,230,168,.08);border-color:rgba(87,230,168,.25)">nano-banana · сейчас</span></h2>
    <div class="vsub">Кадры сгенерированы вживую под «${curNiche().name}». Озвучка и сборка mp4 — задачи локального цеха (ffmpeg), они уже в очереди.</div></div>
    <div style="height:22px"></div>
    <div class="vgrid">${list.map(s=>`
      <div class="vc rv"><div class="vw">
        ${S.realFrames&&S.realFrames[s.id]
          ?`<img src="${S.realFrames[s.id]}" style="width:100%;height:100%;object-fit:cover;display:block">`
          :`<div style="position:absolute;inset:0;display:grid;place-items:center;color:var(--mut);font-family:var(--mono);font-size:11px">кадр не сгенерился</div>`}
      </div>
      <div class="vi"><div class="vt2">${s.title}</div><div class="vs">${segShort(s.segment)} · ~${s.duration}с · hero-кадр</div></div>
      </div>`).join('')}</div>
    <div class="frame-note rv">mp4-ролики (озвучка Gemini TTS + титры + Ken Burns) собирает локальный цех завода — как 6 готовых роликов в демо-нише «Франшиза кофеен».</div>`;
  }
  return `<div class="rv"><div class="eyebrow"><i></i>шаг 3 · цех генерации</div>
  <h2 class="vt">Готовые ролики</h2>
  <div class="vsub">1080×1920 · озвучка + титры · наведи курсор — ролик играет со звуком по клику.</div></div>
  <div style="height:22px"></div>
  <div class="vgrid">${list.map(s=>`
    <div class="vc rv" onmouseenter="hp(this,1)" onmouseleave="hp(this,0)">
      <div class="vw"><span class="hint">hover · play</span>
        <video muted loop playsinline preload="none" poster="${s.visual}" onclick="this.muted=!this.muted"><source src="${s.video}" type="video/mp4"></video></div>
      <div class="vi"><div class="vt2">${s.title}</div><div class="vs">${segShort(s.segment)} · ~${s.duration}с · ${D.generators.find(g=>g.id===S.gen)?.name||''}</div></div>
    </div>`).join('')}</div>`;
}
function startGen(){
  S.generating=true;paint();
  if(mode()==='real'){realGenRun();return;}
  const durs=[900,1400,1100,1300];let i=0;
  const step=()=>{
    const el=document.getElementById('ps'+i);if(!el)return;
    el.classList.add('act');document.getElementById('pd'+i).innerHTML='<span class="spin"></span>';
    setTimeout(()=>{el.classList.remove('act');el.classList.add('done');
      el.querySelector('.pi').innerHTML=svg('check');document.getElementById('pd'+i).textContent='готово';
      i++;i<4?step():finishGen();},durs[i]);
  };
  setTimeout(step,300);
}
async function realGenRun(){
  const mark=(i,run)=>{const el=document.getElementById('ps'+i);if(!el)return;
    if(run){el.classList.add('act');document.getElementById('pd'+i).innerHTML='<span class="spin"></span>';}
    else{el.classList.remove('act');el.classList.add('done');el.querySelector('.pi').innerHTML=svg('check');
      const pd=document.getElementById('pd'+i);if(pd&&!pd.textContent.includes('очеред'))pd.textContent='готово';}};
  await new Promise(r=>setTimeout(r,350));
  mark(0,true);await new Promise(r=>setTimeout(r,800));mark(0,false);
  mark(1,true);await realFrames();mark(1,false);
  for(const i of[2,3]){mark(i,true);await new Promise(r=>setTimeout(r,700));
    document.getElementById('pd'+i).textContent='в очереди цеха';mark(i,false);}
  finishGen();
}
function finishGen(){
  setTimeout(()=>{S.generating=false;S.generated=true;unlockUpTo('pub');paint();
    toast('Ролики собраны',`${S.scripts.size} шт · озвучка + титры · готовы к публикации`);},500);
}

function vPub(){
  const nS=S.scripts.size,nP=S.plats.size;
  const list=activeScripts().filter(s=>S.scripts.has(s.id));
  const poster=s=>mode()==='real'?((S.realFrames||{})[s.id]||''):s.visual;
  const plats=[...S.plats].map(id=>D.platforms.find(p=>p.id===id));
  return `<div class="rv"><div class="eyebrow"><i></i>шаг 4 · дистрибуция</div>
  <h2 class="vt">Публикация</h2>
  <div class="vsub">Один мастер → уникальные копии под каждую площадку. Ничего не уходит без твоего апрува.</div></div>
  <div style="height:22px"></div>
  <div class="pgrid">${D.platforms.map(p=>`
    <div class="pc rv ${S.plats.has(p.id)?'sel':''}" onclick="tg('plats','${p.id}')">
      <span class="ic">${svg(p.id)}</span><span>${p.name}</span></div>`).join('')}</div>
  <div style="height:14px"></div>
  <div class="totals">
    <div class="tot rv"><div class="n" data-count="${nS}">0</div><div class="l">роликов</div></div>
    <div class="tot rv"><div class="n" data-count="${nP}">0</div><div class="l">площадок</div></div>
    <div class="tot rv"><div class="n" data-count="${nS*nP}">0</div><div class="l">публикаций в очереди</div></div>
  </div>
  <div class="sect rv">очередь</div>
  ${list.map(s=>`<div class="q rv"><span class="qi" style="background-image:url('${poster(s)}')"></span>
    <div><div class="qn">${s.title}</div><div class="qm">${segShort(s.segment)} · ~${s.duration}с</div></div>
    <div class="qp">${plats.map(p=>`<span class="tagp">${p.name}</span>`).join('')}</div></div>`).join('')}`;
}

/* ── shared ── */
function tg(k,id){const set=S[k];set.has(id)?set.delete(id):set.add(id);
  if(k==='scripts'&&S.scripts.size)unlockUpTo('gen');paint();}
function dock(){
  const d=document.getElementById('dock');let html='',show=false;
  if(S.view==='refs'&&S.scanned){show=S.refs.size>0;
    html=mode()==='real'
      ?`<span class="di">Выбрано <b>${S.refs.size}</b> референсов</span>
        <button class="btn white" onclick="unlockUpTo('scripts');go('scripts');setTimeout(realScripts,300)">Сценарии по ним · Gemini ${svg('arrow')}</button>`
      :`<span class="di">Выбрано <b>${S.refs.size}</b> референсов</span>
        <button class="btn white" onclick="S.scripts=new Set(D.scripts.map(s=>s.id));unlockUpTo('scripts');go('scripts')">Сценарии по ним ${svg('arrow')}</button>`;}
  if(S.view==='scripts'){show=S.scripts.size>0;
    html=`<span class="di">В производство: <b>${S.scripts.size}</b></span>
    <button class="btn white" onclick="unlockUpTo('gen');go('gen')">В цех генерации ${svg('arrow')}</button>`;}
  if(S.view==='gen'&&!S.generated&&!S.generating){show=!!S.gen;
    html=`<span class="di">Движок: <b>${D.generators.find(g=>g.id===S.gen)?.name||''}</b> · ${S.scripts.size} роликов</span>
    <button class="btn grad" onclick="startGen()">Сгенерировать ${svg('gen')}</button>`;}
  if(S.view==='gen'&&S.generated){show=true;
    html=`<span class="di"><b>${S.scripts.size}</b> роликов готово</span>
    <button class="btn white" onclick="unlockUpTo('pub');go('pub')">К публикации ${svg('arrow')}</button>`;}
  if(S.view==='pub'){show=S.plats.size>0&&S.scripts.size>0;
    html=`<span class="di">Очередь: <b>${S.scripts.size*S.plats.size}</b> публикаций</span>
    <button class="btn grad" onclick="toast('Отправлено в очередь',S.scripts.size*S.plats.size+' публикаций · уйдут после твоего апрува в каждом канале')">Опубликовать ${svg('pub')}</button>`;}
  d.innerHTML=html;d.classList.toggle('show',show);
}
let _tt;
function toast(t,s){const el=document.getElementById('toast');
  document.getElementById('toastT').textContent=t;document.getElementById('toastS').textContent=s;
  el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),3600);}

paint();syncLive();probeProxy();
document.getElementById('view').classList.add('in');
</script>
</body>
</html>
